name: Bug Report
description: Report a bug in thinktank
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened? What did you expect to happen?
      placeholder: "When I run `thinktank run ...`, I get..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. Run `thinktank run "..." -n 3`
        2. Wait for agents to complete
        3. See error...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: thinktank version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Claude model used
      placeholder: "sonnet, opus, haiku"

  - type: input
    id: attempts
    attributes:
      label: Number of agents (--attempts)
      placeholder: "3"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any error messages or output
      render: shell
